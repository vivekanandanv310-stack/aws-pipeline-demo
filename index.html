<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>AWS EC2 Info Detector</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background: #0f172a;
            color: #fff;
            text-align: center;
            padding: 50px;
        }
        .card {
            background: #1e293b;
            padding: 20px;
            border-radius: 12px;
            width: 400px;
            margin: auto;
            box-shadow: 0 0 20px rgba(0,0,0,0.5);
        }
        h2 { color: #38bdf8; }
        p { margin: 10px 0; }
    </style>
</head>
<body>

<div class="card">
    <h2>AWS EC2 Server Info</h2>
    <p><strong>Public IP:</strong> <span id="publicIp">Loading...</span></p>
    <p><strong>City:</strong> <span id="city">Loading...</span></p>
    <p><strong>Country:</strong> <span id="country">Loading...</span></p>
    <p><strong>ISP / Host:</strong> <span id="isp">Loading...</span></p>
    <p><strong>Private IP (approx):</strong> <span id="privateIp">Detecting...</span></p>
</div>

<script>
/* Fetch Public IP + ISP */
fetch("https://ipapi.co/json/")
.then(res => res.json())
.then(data => {
    document.getElementById("publicIp").innerText = data.ip;
    document.getElementById("city").innerText = data.city;
    document.getElementById("country").innerText = data.country_name;
    document.getElementById("isp").innerText = data.org;

    if(data.org && data.org.includes("Amazon")) {
        document.getElementById("isp").innerText += " (AWS EC2 Detected)";
    }
});

/* Attempt to detect Private IP using WebRTC */
function getPrivateIP(callback) {
    const pc = new RTCPeerConnection({iceServers:[]});
    pc.createDataChannel("");
    pc.createOffer().then(offer => pc.setLocalDescription(offer));

    pc.onicecandidate = function(event) {
        if (!event || !event.candidate) return;

        const ipRegex = /([0-9]{1,3}(\.[0-9]{1,3}){3})/;
        const ipMatch = ipRegex.exec(event.candidate.candidate);

        if (ipMatch) {
            callback(ipMatch[1]);
            pc.onicecandidate = null;
        }
    };
}

getPrivateIP(ip => {
    document.getElementById("privateIp").innerText = ip;
});
</script>

</body>
</html>
